<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Търсене на работа</title>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #E3D7E8;
            color: #333;
            line-height: 1.6;
            position: relative;
        }

        .container {
            max-width: 1000px;
            margin: 20px auto;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            margin-top:-185px;
        }

        h2 {
            color: #09989e;
            border-bottom: 2px solid ;
            padding-bottom: 10px;
            margin-top: 20px;
            margin-bottom: 25px;
            font-size: 2em;
            text-align: center;
        }

        form {
            background-color: #f8f9fa;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            margin-bottom: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        form div {
            margin-bottom: 10px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #8274A1;
            font-size: 0.95em;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #dcdcdc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1em;
            transition: border-color 0.2s ease-in-out;
        }
        input[type="text"]:focus,
        input[type="number"]:focus {
            border-color: #8274A1;
            outline: none;
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
        }

        button[type="submit"] {
            grid-column: 1 / -1;
            background-color: #8274A1;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            transition: background-color 0.3s ease, transform 0.2s ease;
            margin-top: 15px;
        }

        button[type="submit"]:hover {
            background-color: #09989e;
            transform: translateY(-2px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
            background-color: #ffffff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            border-radius: 10px;
            overflow: hidden;
            
        
        }

        th, td {
            border: 1px solid #e0e0e0;
            padding: 15px;
            text-align: left;
            vertical-align: top;
            font-size: 0.95em;
        }

        th {
            background-color: #8274A1;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tr:nth-child(even) {
            background-color: #f6f8fa;
        }

        tr:hover {
            background-color: #ebf5fb;
        }

        a {
            color: #8274A1;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.2s ease;
        }

        a:hover {
            text-decoration: underline;
            color: #8274A1;
        }

        .favorite-btn {
            background-color: #09989e;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: bold;
            transition: background-color 0.3s ease;
            white-space: nowrap;
        }

        .favorite-btn:hover {
            background-color: #077a7f;
        }

        .favorite-btn.btn-unfavorite {
            background-color: #e74c3c;
        }

        .favorite-btn.btn-unfavorite:hover {
            background-color: #c0392b;
        }

        p.no-results, p.error-message {
            margin-top: 20px;
            padding: 15px;
            background-color: #ffe0e0;
            border: 1px solid #ffb3b3;
            color: #cc0000;
            border-radius: 8px;
            font-size: 1.1em;
            text-align: center;
        }
        p.info-message {
            margin-top: 20px;
            padding: 15px;
            background-color: #e0f2f7;
            border: 1px solid #b3e5fc;
            color: #8274A1;
            border-radius: 8px;
            font-size: 1.1em;
            text-align: center;
        }
        .photo{
            margin-left: 55%
       
       
            
        }
        .arrow{
           
            max-width:150px;
            width: 100%;
         
    position: fixed;   
    top: 20px;
    left: 20px;
    width: 150px;
    z-index: 99999;
}
@media (max-width: 1024px) {
        .container{
            margin-left: 150px;
            margin-right: -100px;
        } 
        .photo{
            margin-left: 65%;

        }

} 
@media (max-width: 768px) {
        .container{
            margin-left: 100px;
            margin-right: -50px;
        } 
        .photo{
            margin-left: 55%;

        }
    } 
    </style>
</head>
<body>
    <img class="photo" src="photos/0-02-05-b2e5265937e32c427cebb5bfeb3ecdb9a5f50602c038f9ffd6b2f32b7d4d1b80_1c8c6fe2f4ce6c07-removebg-preview.png">
     <a href="searching.html"><img class="arrow" src="photos/arrow67.png"></a>
<div class="container">
    <h2>Търсене на работа</h2>

    <form> 
        <div>
            <label for="country">Държава:</label>
            <input type="text" id="country" name="country" placeholder="Напр: United States" required>
        </div>
        <div>
            <label for="city">Град (по желание):</label>
            <input type="text" id="city" name="city" placeholder="Напр: Dallas">
        </div>
        <div>
            <label for="job">Професия:</label>
            <input type="text" id="job" name="job" placeholder="Напр: Developer, Nurse, Manager">
        </div>
        <div>
            <label for="experience">Минимални години стаж:</label>
            <input type="number" id="experience" name="experience" placeholder="Напр: 3" min="0">
        </div>
        <button type="submit">Търси</button>
    </form>

    <h2>Резултати</h2>
    <p class="info-message">Моля, въведете критерии за търсене на работа.</p>
</div>
<script>
    // --- GLOBAL VARIABLES ---
    let jobsData = []; // This starts empty
    let fuse;          // This will hold the search engine
    const options = {
        keys: ['title', 'city', 'company'],
        threshold: 0.3
    };

    // --- STEP 1: FETCH DATA FROM YOUR SERVER ---
    // This runs as soon as the page loads
    fetch('/jobs.json')
        .then(response => {
            if (!response.ok) throw new Error("Could not load jobs.json");
            return response.json();
        })
        .then(data => {
            jobsData = data;
            // Now that we have data, initialize Fuse.js
            fuse = new Fuse(jobsData, options); 
            console.log("Scraped jobs loaded into the search engine!");
            
            // Optional: Update the info message to say we are ready
            document.querySelector('.info-message').innerText = `Намерени ${jobsData.length} обяви. Въведете град или професия.`;
        })
        .catch(err => {
            console.error(err);
            document.querySelector('.info-message').innerText = "Грешка при зареждане на данните.";
        });

    // --- STEP 2: HANDLE SEARCH ---
    const form = document.querySelector('form');
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        
        // Safety check: Don't search if data hasn't loaded yet
        if (!fuse) return;

        const jobTitle = document.getElementById('job').value;
        const city = document.getElementById('city').value;
        const experience = document.getElementById('experience').value;

        // Perform the Fuzzy Search using Fuse.js
        let results = jobTitle ? fuse.search(jobTitle).map(r => r.item) : jobsData;

        // Filter by City (Normal filter)
        if (city) {
            results = results.filter(j => 
                j.city.toLowerCase().includes(city.toLowerCase())
            );
        }

        // Filter by Experience (LINQ-style filter)
        if (experience) {
            results = results.filter(j => j.experience <= parseInt(experience));
        }

        renderResults(results);
    });

    // --- STEP 3: SHOW RESULTS IN THE TABLE ---
    function renderResults(results) {
        const container = document.querySelector('.container');
        const infoMsg = document.querySelector('.info-message');
        
        const oldTable = document.querySelector('table');
        if (oldTable) oldTable.remove();

        if (results.length === 0) {
            infoMsg.style.display = 'block';
            infoMsg.innerText = "Няма намерени резултати за тези критерии.";
            return;
        }

        infoMsg.style.display = 'none';
        
        let tableHtml = `<table>
            <thead>
                <tr>
                    <th>Позиция</th>
                    <th>Компания</th>
                    <th>Град</th>
                    <th>Линк</th>
                    <th>Действие</th>
                </tr>
            </thead>
            <tbody>`;
        
        results.forEach(job => {
            const isFavorited = userFavorites.some(fav => fav.title === job.title && fav.company === job.company);
            const btnText = isFavorited ? '❤️ Отстрани' : '🤍 Добави в любими';
            const btnClass = isFavorited ? 'btn-unfavorite' : 'btn-favorite';
            
            tableHtml += `<tr>
                <td>${job.title}</td>
                <td>${job.company}</td>
                <td>${job.city}</td>
                <td><a href="${job.link}" target="_blank">Към обявата</a></td>
                <td><button class="favorite-btn ${btnClass}" data-title="${job.title}" data-company="${job.company}" data-city="${job.city}" data-link="${job.link}" data-experience="${job.experience}">${btnText}</button></td>
            </tr>`;
        });

        tableHtml += '</tbody></table>';
        container.insertAdjacentHTML('beforeend', tableHtml);

        // Add event listeners to favorite buttons
        document.querySelectorAll('.favorite-btn').forEach(btn => {
            btn.addEventListener('click', toggleFavorite);
        });
    }
    
    // Toggle favorite function
    async function toggleFavorite(e) {
        const btn = e.target;
        const title = btn.dataset.title;
        const company = btn.dataset.company;
        const city = btn.dataset.city;
        const link = btn.dataset.link;
        const experience = btn.dataset.experience;

        const isFavorited = btn.classList.contains('btn-unfavorite');
        const endpoint = isFavorited ? '/remove-favorite' : '/add-favorite';

        try {
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ title, company, city, link, experience })
            });

            const data = await response.json();

            if (response.ok) {
                if (isFavorited) {
                    btn.classList.remove('btn-unfavorite');
                    btn.classList.add('btn-favorite');
                    btn.innerText = '🤍 Добави в любими';
                    userFavorites = userFavorites.filter(fav => !(fav.title === title && fav.company === company));
                } else {
                    btn.classList.remove('btn-favorite');
                    btn.classList.add('btn-unfavorite');
                    btn.innerText = '❤️ Отстрани';
                    userFavorites.push({ title, company, city, link, experience });
                }
            } else if (response.status === 401) {
                alert('Моля, влезте в профила си, за да добавяте в любими.');
            } else {
                alert('Грешка: ' + data.error);
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Грешка при обновяване на любимите.');
        }
    }

    // Load user favorites on page load
    let userFavorites = [];
    async function loadUserFavorites() {
        try {
            const response = await fetch('/get-favorites', {
                credentials: 'include'
            });
            if (response.ok) {
                const data = await response.json();
                userFavorites = data.favorites || [];
            }
        } catch (error) {
            console.log('Not logged in or favorites unavailable');
        }
    }

    // Load favorites when page loads
    window.addEventListener('load', loadUserFavorites);
</script>
</body>
</html>
