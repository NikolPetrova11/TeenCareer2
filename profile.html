<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="myprofile.css">
    <title>TeenCareer Portal - Профил</title>
</head>
<body>

<a href="/"><img class="arrow" src="photos/arrow67.png"></a>

<div class="main">
    
    <div class="header">
        <h1>Моят профил</h1>
    </div>

    <div class="profile-header">
        <img src="photos/viber_image_2025-07-15_17-38-46-235.png">
        <div>
            <h3><div class="value" id="user-username">Зареждане...</div></h3>
            <p>Регистриран потребител</p>
        </div>
    </div>

    <div class="tabs">
        <div class="active" data-index="0">За мен</div>
        <div data-index="1">Любими</div>
        <div data-index="2">CV файлове</div>
        <div data-index="3">Портфолиа</div>
    </div>

    <div class="card" id="profile-card">
        <h3>Лични данни</h3>
        <div class="info-grid">
            <div>
                <div class="label">Дата на раждане:</div>
                <div class="value" id="user-dob">--.--.----</div>
            </div>
            <div>
                <div class="label">Email:</div>
                <div class="value" id="user-email">------</div>
            </div>
            <div>
                <div class="label">Телефон:</div>
                <div class="value" id="user-phone">------</div>
            </div>
            <div>
                <div class="label">Парола:</div>
                <div style="display:flex; align-items:center; gap:10px;">
                    <!-- Eye -->       
                    <span class="value" id="passwordField">********</span>
        <span id="togglePassword" style="cursor:pointer; display:flex; align-items:center;">

            <!-- Closed -->
            <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" width="22" height="22"
                 viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.5 18.5 0 0 1 5.06-5.94"></path>
                <path d="M1 1l22 22"></path>
            </svg>

            <!-- Opened -->
            <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" width="22" height="22"
                 viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>

        </span>
        <!-- Eye script -->
<script>
const realPass = "moqtaRealnaParola123";

let visible = false;

const passField = document.getElementById("passwordField");
const eyeOpen = document.getElementById("eyeOpen");
const eyeClosed = document.getElementById("eyeClosed");

document.getElementById("togglePassword").addEventListener("click", () => {

    if (!visible) {
        // show
        passField.textContent = realPass;
        eyeClosed.style.display = "none";
        eyeOpen.style.display = "block";
        visible = true;
    } else {
        // hide
        passField.textContent = "********";
        eyeOpen.style.display = "none";
        eyeClosed.style.display = "block";
        visible = false;
    }
});
</script>
                </div>
            </div>
        </div>
        
        
        <div class="buttons">
            <button class="btn edit" onclick="window.location.href='/edit-profile'">Редактирай</button>
            <button class="btn profile" onclick="logout()">Излез от профила</button>
        </div>
    </div>
</div>

<script>
// Server info
async function loadUserData() {
    try {
        const response = await fetch('/api/user-data');
        if (!response.ok) {
            window.location.href = '/'; 
            return;
        }

        const user = await response.json();

        document.getElementById('user-username').innerText = user.username || 'Потребител';
        document.getElementById('user-email').innerText = user.email;
        document.getElementById('user-phone').innerText = user.phone || 'Няма данни';
        
        if (user.dob) {
            const date = new Date(user.dob);
            document.getElementById('user-dob').innerText = date.toLocaleDateString('bg-BG') + ' г.';
        }
    } catch (err) {
        console.error("Грешка при зареждане:", err);
    }
}

// Tabs
const tabs = document.querySelectorAll('.tabs div');
const card = document.getElementById('profile-card');
const originalContent = card.innerHTML; 

tabs.forEach(tab => {
    tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        const index = tab.getAttribute('data-index');

        if (index === "0") {
            card.innerHTML = originalContent;
            loadUserData(); 
        } else if (index === "2") {
            // load CVs
            card.innerHTML = `<h3>CV файлове</h3><div id="cv-list">Зареждане...</div>`;
            fetch('/api/user-cvs').then(r=>{
                if (!r.ok) throw new Error('fetch');
                return r.json();
            }).then(cvs=>{
                const list = document.getElementById('cv-list');
                if (!cvs.length) {
                    list.innerHTML = `<p>Все още нямате CV файлове.</p>`;
                    return;
                }
                list.innerHTML = '';
                cvs.forEach((item,i)=>{
                    const div = document.createElement('div');
                    div.className = 'saved-item';
                    const date = new Date(item.createdAt).toLocaleString('bg-BG');
                    div.innerHTML = `<span>CV №${i+1} (${date})</span> <button data-index="${i}" class="gen-cv">Генерирай</button>`;
                    list.appendChild(div);
                });
                list.addEventListener('click', e=>{
                    if (e.target.classList.contains('gen-cv')) {
                        const idx = e.target.getAttribute('data-index');
                        const cv = cvs[idx].data;
                        // post to generate-pdf
                        const form = document.createElement('form');
                        form.method='POST'; form.action='/generate-pdf'; form.target='_blank';
                        for(const k in cv){
                            const inp=document.createElement('input');
                            inp.type='hidden'; inp.name=k; inp.value=cv[k];
                            form.appendChild(inp);
                        }
                        document.body.appendChild(form); form.submit(); document.body.removeChild(form);
                    }
                });
            }).catch(err=>{
                console.error(err);
                document.getElementById('cv-list').innerHTML = '<p>Грешка при зареждане.</p>';
            });
        } else if (index === "3") {
            // load portfolios
            card.innerHTML = `<h3>Портфолиа</h3><div id="port-list">Зареждане...</div>`;
            fetch('/api/user-portfolios').then(r=>{
                if (!r.ok) throw new Error('fetch');
                return r.json();
            }).then(ps=>{
                const list = document.getElementById('port-list');
                if (!ps.length) {
                    list.innerHTML = `<p>Все още нямате портфолиа.</p>`;
                    return;
                }
                list.innerHTML = '';
                ps.forEach((item,i)=>{
                    const div = document.createElement('div');
                    div.className = 'saved-item';
                    const date = new Date(item.createdAt).toLocaleString('bg-BG');
                    div.innerHTML = `<span>Портфолио №${i+1} (${date})</span> <button data-index="${i}" class="gen-port">Генерирай</button>`;
                    list.appendChild(div);
                });
                list.addEventListener('click', e=>{
                    if (e.target.classList.contains('gen-port')) {
                        const idx = e.target.getAttribute('data-index');
                        const port = ps[idx].data;
                        const form = document.createElement('form');
                        form.method='POST'; form.action='/generate-portfolio'; form.target='_blank';
                        for(const k in port){
                            const inp=document.createElement('input');
                            inp.type='hidden'; inp.name=k; inp.value=port[k];
                            form.appendChild(inp);
                        }
                        document.body.appendChild(form); form.submit(); document.body.removeChild(form);
                    }
                });
            }).catch(err=>{
                console.error(err);
                document.getElementById('port-list').innerHTML = '<p>Грешка при зареждане.</p>';
            });
        } else {
            let title = tab.innerText;
            card.innerHTML = `
                <h3>${title}</h3>
                <div style="margin-top: 20px; padding: 60px 40px; background: white; border: 2px dashed #ddd; border-radius: 10px; text-align: center; color: #999;">
                    <p>Все още нямате съдържание в ${title.toLowerCase()}</p>
                </div>
            `;
        }
    });
});

// Logout
async function logout() {
    await fetch('/logout'); 
    window.location.href = '/';
}

loadUserData();
</script>

</body>
</html>
